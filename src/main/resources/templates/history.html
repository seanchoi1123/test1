<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암산 이력</title>
    <style>
        body {
            font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(120deg, #f8fafc, #ecfeff);
            color: #0f172a;
        }

        .app {
            width: min(760px, 94vw);
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }

        .menu {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .menu a {
            text-decoration: none;
            color: #0f172a;
            background: #e2e8f0;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .menu a.active {
            background: #2563eb;
            color: #fff;
        }

        h1 {
            margin: 0 0 12px;
        }

        .summary {
            margin-bottom: 16px;
            color: #334155;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            color: #475569;
            font-weight: 700;
            background: #f8fafc;
        }

        .ok {
            color: #166534;
            font-weight: 700;
        }

        .bad {
            color: #b91c1c;
            font-weight: 700;
        }

        .empty {
            color: #64748b;
            padding: 24px 4px;
        }

        .actions {
            margin-top: 14px;
        }

        button {
            border: none;
            background: #dc2626;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="app">
    <nav class="menu">
        <a href="/">암산 연습</a>
        <a class="active" href="/history">이력 보기</a>
    </nav>

    <h1>풀이 이력</h1>
    <p id="summary" class="summary">기록을 불러오는 중...</p>

    <table>
        <thead>
        <tr>
            <th>시간</th>
            <th>문제</th>
            <th>내 답</th>
            <th>정답</th>
            <th>결과</th>
        </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>

    <div class="actions">
        <button id="clearBtn" type="button">이력 전체 삭제</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'mentalMathHistory';
    const historyBody = document.getElementById('historyBody');
    const summaryEl = document.getElementById('summary');

    function loadHistory() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function formatDate(iso) {
        return new Date(iso).toLocaleString('ko-KR');
    }

    function render() {
        const rows = loadHistory();

        if (rows.length === 0) {
            historyBody.innerHTML = '<tr><td class="empty" colspan="5">아직 풀이 이력이 없습니다. 먼저 암산 연습을 해보세요.</td></tr>';
            summaryEl.textContent = '총 0문제 · 정답률 0%';
            return;
        }

        const correctCount = rows.filter((item) => item.correct).length;
        const accuracy = Math.round((correctCount / rows.length) * 100);
        summaryEl.textContent = `총 ${rows.length}문제 · 정답 ${correctCount}문제 · 정답률 ${accuracy}%`;

        historyBody.innerHTML = rows.map((item) => `
            <tr>
                <td>${formatDate(item.createdAt)}</td>
                <td>${item.left} × ${item.right}</td>
                <td>${item.answer}</td>
                <td>${item.expected}</td>
                <td class="${item.correct ? 'ok' : 'bad'}">${item.correct ? '정답' : '오답'}</td>
            </tr>
        `).join('');
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        render();
    });

    render();
</script>
</body>
</html>
